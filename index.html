<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xuxiangyu169 - 专属动态主页</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 追光鼠标光标 -->
    <div id="cursor-aura"></div>
    <div id="cursor-dot"></div>

    <div class="background">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
    </div>
    
    <main class="container">
        <div class="glass-card" id="tilt-card">
            <div class="status-badge">
                <span class="dot"></span> 云端正常运行
            </div>
            <h1 class="title">你好，世界！</h1>
            <p class="subtitle">欢迎来到由自定义域名驱动的未来风格着陆页。</p>
            <p class="description">
                这个精美的页面目前已稳妥托管在 <strong>GitHub Pages</strong> 上，并且正由 <strong>Cloudflare</strong> 的企业级安全网络提供全球边缘防线和加速，一切运转完美。
            </p>

            <!-- 技能看板区域 -->
            <div class="skills-dashboard">
                <h3 class="dash-title">核心战力模型</h3>
                <div class="skill-item">
                    <div class="skill-info">
                        <span class="skill-name">现代 Web 全栈开发</span>
                        <span class="skill-pct">90%</span>
                    </div>
                    <div class="skill-bar-bg">
                        <div class="skill-bar-fill" style="--target-width: 90%;"></div>
                    </div>
                </div>
                <div class="skill-item">
                    <div class="skill-info">
                        <span class="skill-name">Serverless 无服务器云架构</span>
                        <span class="skill-pct">85%</span>
                    </div>
                    <div class="skill-bar-bg">
                        <div class="skill-bar-fill" style="--target-width: 85%;"></div>
                    </div>
                </div>
                <div class="skill-item">
                    <div class="skill-info">
                        <span class="skill-name">极致 UI / UX 用户体验</span>
                        <span class="skill-pct">75%</span>
                    </div>
                    <div class="skill-bar-bg">
                        <div class="skill-bar-fill" style="--target-width: 75%;"></div>
                    </div>
                </div>
            </div>

            <div class="action-buttons hover-target">
                <a href="https://github.com/xuxiangyu169/html-test" class="btn primary-btn hover-target" target="_blank">获取开源代码</a>
                <a href="#" class="btn secondary-btn hover-target" id="confettiBtn">尝试互动</a>
            </div>
        </div>
    </main>

    <script>
        // --- 鼠标追光追踪逻辑 ---
        const cursorDot = document.getElementById('cursor-dot');
        const cursorAura = document.getElementById('cursor-aura');
        const hoverTargets = document.querySelectorAll('.hover-target, .btn');

        let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
        let auraX = mouseX, auraY = mouseY;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            // 圆心点瞬间跟随
            cursorDot.style.left = `${mouseX}px`;
            cursorDot.style.top = `${mouseY}px`;
        });

        // 光晕平滑跟随算法
        function animateAura() {
            let dx = mouseX - auraX;
            let dy = mouseY - auraY;
            
            auraX += dx * 0.15;
            auraY += dy * 0.15;
            
            cursorAura.style.left = `${auraX}px`;
            cursorAura.style.top = `${auraY}px`;
            
            requestAnimationFrame(animateAura);
        }
        animateAura();

        // 悬停时放大光晕的交互效果
        hoverTargets.forEach(target => {
            target.addEventListener('mouseenter', () => {
                cursorAura.classList.add('aura-hover');
                cursorDot.classList.add('dot-hover');
            });
            target.addEventListener('mouseleave', () => {
                cursorAura.classList.remove('aura-hover');
                cursorDot.classList.remove('dot-hover');
            });
        });

        // --- 3D 悬浮视差逻辑 ---
        const container = document.querySelector('.container');
        const card = document.getElementById('tilt-card');

        container.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            // 计算鼠标相对于卡片中心的坐标 (范围 -1 到 1)
            const x = (e.clientX - rect.left - rect.width / 2) / (rect.width / 2);
            const y = (e.clientY - rect.top - rect.height / 2) / (rect.height / 2);

            // 最大侧倾角度
            const maxDegrees = 12;
            const rotateX = -y * maxDegrees;
            const rotateY = x * maxDegrees;

            card.style.transform = `perspective(1200px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
        });

        container.addEventListener('mouseleave', () => {
            // 鼠标移出时平滑复位
            card.style.transform = `perspective(1200px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
        });

        // 按钮点击特效
        document.getElementById('confettiBtn').addEventListener('click', function(e) {
            e.preventDefault();
            this.textContent = '太棒了！✨';
            this.style.boxShadow = '0 0 20px rgba(99, 102, 241, 0.8)';
            setTimeout(() => {
                this.textContent = '尝试互动';
                this.style.boxShadow = 'none';
            }, 1000);
        });
        
        // 延迟触发进度条生长动画
        setTimeout(() => {
            document.querySelectorAll('.skill-bar-fill').forEach(bar => {
                bar.style.width = bar.getAttribute('style').match(/--target-width:\s*([^;]+);/)[1];
            });
        }, 500);
    </script>
</body>
</html>
